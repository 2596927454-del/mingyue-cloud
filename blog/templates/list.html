<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>明月 · 博客</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-dark.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Playfair+Display:ital@0;1&family=JetBrains+Mono:wght@300;400&display=swap');

  :root {
    --bg: #2a2520; --surface: #322d27;
    --ink: #e8e2d8; --ink-dim: #9a948c;
    --gold: #b8956a; --gold-dim: rgba(184,149,106,0.12);
    --border: rgba(255,255,255,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg); color: var(--ink);
    font-family: 'Noto Serif SC', serif; min-height: 100vh;
    /* 极简纹理：细密横纹模拟纸张 */
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px);
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(184,149,106,0.04) 0%, transparent 70%);
  }
  .container { position: relative; z-index: 1; max-width: 660px; margin: 0 auto; padding: 80px 24px 60px; }

  /* 头部 */
  .blog-header { text-align: center; padding-bottom: 36px; margin-bottom: 48px; position: relative; }
  .blog-header::after {
    content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 32px; height: 2px; background: var(--gold); opacity: 0.5;
  }
  .blog-header h1 {
    font-family: 'Noto Serif SC', serif; font-weight: 600;
    font-size: 36px; color: var(--ink); letter-spacing: 0.08em;
  }
  .blog-header h1 span { color: var(--gold); font-weight: 700; }
  .blog-header .sub {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--ink-dim); letter-spacing: 0.3em; margin-top: 10px;
    text-transform: uppercase;
  }

  /* 文章列表 */
  .post-item {
    padding: 28px 0; border-bottom: 1px solid var(--border);
    transition: all 0.35s ease;
  }
  .post-item:last-child { border-bottom: none; }
  .post-item:hover { padding-left: 20px; }
  .post-item a { text-decoration: none; display: block; }
  .post-item .post-date {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-dim); letter-spacing: 0.08em; margin-bottom: 8px;
  }
  .post-item .post-title {
    font-size: 20px; color: var(--ink); font-weight: 600;
    letter-spacing: 0.04em; margin-bottom: 8px; transition: color 0.3s;
    line-height: 1.4;
  }
  .post-item:hover .post-title { color: var(--gold); }
  .post-item .post-excerpt {
    font-size: 14px; color: var(--ink-dim); line-height: 1.9; font-weight: 300;
  }

  .empty { text-align: center; color: var(--ink-dim); padding: 80px 0;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.1em; }

  .back-link {
    display: block; text-align: center; margin-top: 48px;
    color: var(--ink-dim); font-size: 12px; text-decoration: none;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em;
    transition: color 0.3s;
  }
  .back-link:hover { color: var(--gold); }

  /* 代码块 */
  .markdown-body { background: transparent !important; color: var(--ink) !important; }
  .markdown-body pre { background: var(--surface) !important; border: 1px solid var(--border) !important; }
  .markdown-body code { font-family: 'JetBrains Mono', monospace; font-size: 0.88em; }
</style>
</head>
<body>
<div class="container">
  <div class="blog-header">
    <h1>明<span>·</span>月 博客</h1>
    <p class="sub">Thoughts &amp; Notes</p>
  </div>

  {% if posts %}
    {% for post in posts %}
    <div class="post-item">
      <a href="/blog/{{ post.slug }}">
        <div class="post-date">{{ post.date_str }}</div>
        <div class="post-title">{{ post.title }}</div>
        <div class="post-excerpt">{{ post.excerpt }}</div>
      </a>
    </div>
    {% endfor %}
  {% else %}
    <div class="empty">还没有文章</div>
  {% endif %}

  <a class="back-link" href="/">&larr; 返回主页</a>
</div>
</body>
</html>
