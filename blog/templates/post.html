<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ post.title }} - 明月 · 博客</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=JetBrains+Mono:wght@300;400&display=swap');

  :root {
    --bg: #f5f1eb; --surface: #ede6db;
    --ink: #3d362c; --ink-dim: #8a8278;
    --gold: #9b7b52; --gold-dim: rgba(155,123,82,0.08);
    --border: rgba(0,0,0,0.07);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg); color: var(--ink);
    font-family: 'Noto Serif SC', serif; min-height: 100vh;
  }
  .container { max-width: 680px; margin: 0 auto; padding: 80px 24px 60px; }

  .post-header { text-align: center; padding-bottom: 32px; margin-bottom: 40px; position: relative; }
  .post-header::after {
    content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 24px; height: 2px; background: var(--gold); opacity: 0.5;
  }
  .post-header h1 {
    font-size: 28px; color: var(--ink); font-weight: 600;
    letter-spacing: 0.06em; line-height: 1.5; margin-bottom: 12px;
  }
  .post-header .post-date {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--gold); letter-spacing: 0.12em;
  }

  .markdown-body {
    background: transparent !important; color: var(--ink) !important;
    font-family: 'Noto Serif SC', serif !important; line-height: 2 !important;
    font-size: 15px !important; font-weight: 300 !important;
  }
  .markdown-body h1, .markdown-body h2, .markdown-body h3 {
    color: var(--ink) !important; border-bottom-color: var(--border) !important;
    font-weight: 600 !important; margin-top: 2em !important;
  }
  .markdown-body pre { background: var(--surface) !important; border: 1px solid var(--border) !important; }
  .markdown-body code { font-family: 'JetBrains Mono', monospace !important; font-size: 0.88em !important; background: var(--gold-dim) !important; border-radius: 2px; padding: 1px 5px; }
  .markdown-body pre code { background: transparent !important; padding: 0; }
  .markdown-body a { color: var(--gold) !important; }
  .markdown-body blockquote { border-left: 2px solid var(--gold) !important; color: var(--ink-dim) !important; font-style: italic; }
  .markdown-body table, .markdown-body th, .markdown-body td { border-color: var(--border) !important; }
  .markdown-body hr { background-color: var(--border) !important; }

  .back-row {
    display: flex; justify-content: space-between; margin-top: 56px;
    padding-top: 24px; border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
  }
  .back-row a { color: var(--ink-dim); text-decoration: none; letter-spacing: 0.1em; transition: color 0.3s; }
  .back-row a:hover { color: var(--gold); }
</style>
</head>
<body>
<div class="container">
  <div class="post-header">
    <h1>{{ post.title }}</h1>
    <div class="post-date">{{ post.date_str }}</div>
  </div>
  <article class="markdown-body">{{ post.content|safe }}</article>
  <div class="back-row">
    <a href="/blog/">&larr; 文章列表</a>
    <a href="/">&larr; 返回主页</a>
  </div>
</div>
</body>
</html>
