<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ post.title }} - 明月 · 博客</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-dark.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Playfair+Display:ital@0;1&family=JetBrains+Mono:wght@300;400&display=swap');

  :root {
    --bg: #2a2520; --surface: #322d27;
    --ink: #e8e2d8; --ink-dim: #9a948c;
    --gold: #b8956a; --gold-dim: rgba(184,149,106,0.12);
    --border: rgba(255,255,255,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg); color: var(--ink);
    font-family: 'Noto Serif SC', serif; min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.004) 2px, rgba(255,255,255,0.004) 4px);
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(184,149,106,0.04) 0%, transparent 70%);
  }
  .container { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 80px 24px 60px; }

  /* 文章头部 */
  .post-header { text-align: center; padding-bottom: 32px; margin-bottom: 40px; position: relative; }
  .post-header::after {
    content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 24px; height: 2px; background: var(--gold); opacity: 0.5;
  }
  .post-header h1 {
    font-size: 28px; color: var(--ink); font-weight: 600;
    letter-spacing: 0.06em; line-height: 1.5; margin-bottom: 12px;
  }
  .post-header .post-date {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--gold); letter-spacing: 0.12em;
  }

  /* 正文 */
  .markdown-body {
    background: transparent !important; color: var(--ink) !important;
    font-family: 'Noto Serif SC', serif !important; line-height: 2 !important;
    font-size: 15px !important; font-weight: 300 !important;
  }
  .markdown-body h1, .markdown-body h2, .markdown-body h3 {
    color: var(--ink) !important; border-bottom-color: var(--border) !important;
    font-weight: 600 !important; letter-spacing: 0.04em !important;
    margin-top: 2em !important;
  }
  .markdown-body h2 { font-size: 1.5em !important; }
  .markdown-body h3 { font-size: 1.2em !important; }
  .markdown-body pre { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: 3px !important; }
  .markdown-body code { font-family: 'JetBrains Mono', monospace !important; font-size: 0.88em !important; background: var(--gold-dim) !important; border-radius: 2px; padding: 1px 5px; }
  .markdown-body pre code { background: transparent !important; padding: 0; }
  .markdown-body a { color: var(--gold) !important; }
  .markdown-body blockquote {
    border-left: 2px solid var(--gold) !important; color: var(--ink-dim) !important;
    font-style: italic; margin: 1.5em 0 !important; padding: 0.5em 1.2em !important;
  }
  .markdown-body table { border-color: var(--border) !important; }
  .markdown-body th, .markdown-body td { border-color: var(--border) !important; }
  .markdown-body img { border-radius: 3px; }
  .markdown-body p { margin-bottom: 1.2em !important; }
  .markdown-body hr { background-color: var(--border) !important; height: 1px !important; }

  .back-row {
    display: flex; justify-content: space-between; margin-top: 56px;
    padding-top: 24px; border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
  }
  .back-row a { color: var(--ink-dim); text-decoration: none; letter-spacing: 0.1em; transition: color 0.3s; }
  .back-row a:hover { color: var(--gold); }
</style>
</head>
<body>
<div class="container">
  <div class="post-header">
    <h1>{{ post.title }}</h1>
    <div class="post-date">{{ post.date_str }}</div>
  </div>
  <article class="markdown-body">{{ post.content|safe }}</article>
  <div class="back-row">
    <a href="/blog/">&larr; 文章列表</a>
    <a href="/">&larr; 返回主页</a>
  </div>
</div>
</body>
</html>
