<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图床 · 明月</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Serif+SC:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400&display=swap');

  :root {
    --bg: #060b18; --moon: #f5f0e8; --gold: #c9a96e;
    --accent: #7b9ec7; --glass: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08); --text: #c8cdd6; --dim: #6b7280;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 60px 20px;
  }
  .container { max-width: 700px; width: 100%; }

  h1 {
    font-family: 'Noto Serif SC', serif; font-weight: 900;
    font-size: 40px; color: var(--moon); letter-spacing: 0.06em;
    text-align: center; margin-bottom: 8px;
  }
  h1 .dot { color: var(--gold); }
  .sub {
    text-align: center; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--dim); letter-spacing: 0.2em;
    margin-bottom: 40px; text-transform: uppercase;
  }

  /* 上传区 */
  .drop-zone {
    border: 2px dashed rgba(201,169,110,0.25);
    border-radius: 4px;
    padding: 48px 24px;
    text-align: center;
    transition: all 0.3s;
    background: var(--glass);
    cursor: pointer;
    margin-bottom: 12px;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--gold);
    background: rgba(201,169,110,0.04);
  }
  .drop-zone .icon { font-size: 40px; margin-bottom: 12px; }
  .drop-zone .hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--dim); letter-spacing: 0.04em;
  }
  .drop-zone .hint em { color: var(--gold); font-style: normal; }
  .drop-zone .limit {
    font-size: 11px; color: var(--dim); margin-top: 8px;
  }
  #fileInput { display: none; }

  .progress-bar {
    height: 3px; background: var(--border); border-radius: 2px;
    margin-bottom: 24px; overflow: hidden; display: none;
  }
  .progress-bar .fill {
    height: 100%; background: var(--gold);
    transition: width 0.3s; width: 0%;
  }

  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    padding: 10px 24px; border-radius: 2px; font-size: 14px;
    z-index: 999; animation: toastIn 0.3s ease;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .toast-ok { background: rgba(80,200,120,0.2); border: 1px solid rgba(80,200,120,0.4); color: #a0e0b0; }
  .toast-err { background: rgba(240,100,100,0.2); border: 1px solid rgba(240,100,100,0.4); color: #e0a0a0; }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } }

  /* 图片网格 */
  .section-title {
    font-family: 'Playfair Display', 'Noto Serif SC', serif;
    font-size: 18px; color: var(--moon); margin: 32px 0 16px;
  }
  .image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }
  .image-card {
    background: var(--glass); border: 1px solid var(--border);
    border-radius: 2px; overflow: hidden; transition: border-color 0.3s;
    position: relative;
  }
  .image-card:hover { border-color: rgba(201,169,110,0.3); }
  .image-card img {
    width: 100%; height: 140px; object-fit: cover; display: block;
    background: rgba(0,0,0,0.3);
  }
  .image-card .info {
    padding: 8px 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--dim); letter-spacing: 0.03em;
    display: flex; justify-content: space-between; align-items: center;
  }
  .image-card .url {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 120px; color: var(--accent); cursor: pointer;
  }
  .image-card .url:hover { color: var(--gold); }
  .image-card .copy-btn {
    background: none; border: 1px solid var(--border); border-radius: 2px;
    color: var(--dim); cursor: pointer; padding: 2px 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    transition: all 0.3s;
  }
  .image-card .copy-btn:hover { border-color: var(--gold); color: var(--gold); }
  .image-card .delete-btn {
    position: absolute; top: 4px; right: 4px;
    background: rgba(0,0,0,0.6); border: none; color: #e06060;
    width: 22px; height: 22px; border-radius: 2px; cursor: pointer;
    font-size: 12px; opacity: 0; transition: opacity 0.3s;
  }
  .image-card:hover .delete-btn { opacity: 1; }

  .empty { text-align: center; color: var(--dim); padding: 40px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; }

  /* 返回链接 */
  .back-link {
    display: block; text-align: center; margin-top: 40px;
    color: var(--dim); font-size: 12px;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em;
    transition: color 0.3s;
  }
  .back-link:hover { color: var(--gold); }
</style>
</head>
<body>

<div class="container">
  <h1>图<span class="dot">·</span>床</h1>
  <p class="sub">Image Hosting</p>

  <div class="drop-zone" id="dropZone">
    <div class="icon">&#x21E7;</div>
    <p class="hint">拖拽图片到这里，或 <em>点击选择</em></p>
    <p class="limit">支持 JPG / PNG / GIF / WebP，最大 5MB</p>
  </div>
  <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp">

  <div class="progress-bar" id="progress"><div class="fill" id="progressFill"></div></div>

  <div class="section-title">已上传</div>
  <div class="image-grid" id="imageGrid">
    <div class="empty">加载中...</div>
  </div>

  <a class="back-link" href="/">&#x2190; 返回主页</a>
</div>

<script>
var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var progress = document.getElementById('progress');
var progressFill = document.getElementById('progressFill');
var imageGrid = document.getElementById('imageGrid');

// 拖拽事件
dropZone.addEventListener('click', function() { fileInput.click(); });
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('drag-over'); });
dropZone.addEventListener('drop', function(e) {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) upload(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', function() {
  if (fileInput.files.length) upload(fileInput.files[0]);
});

function toast(msg, ok) {
  var t = document.createElement('div');
  t.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}

function upload(file) {
  var ext = file.name.split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','gif','webp'].indexOf(ext) === -1) {
    toast('不支持的文件类型: .' + ext, false); return;
  }
  if (file.size > 5 * 1024 * 1024) {
    toast('文件大小不能超过 5MB', false); return;
  }

  var formData = new FormData();
  formData.append('file', file);

  progress.style.display = 'block';
  progressFill.style.width = '30%';

  fetch('/api/upload', { method: 'POST', body: formData })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      progressFill.style.width = '100%';
      setTimeout(function() { progress.style.display = 'none'; progressFill.style.width = '0'; }, 500);
      if (data.ok) {
        toast('上传成功!', true);
        loadImages();
      } else {
        toast(data.error || '上传失败', false);
      }
    })
    .catch(function() {
      progress.style.display = 'none';
      toast('上传失败，请重试', false);
    });
}

function loadImages() {
  fetch('/api/images')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.length) {
        imageGrid.innerHTML = '<div class="empty">还没有图片，拖一张上来吧</div>';
        return;
      }
      var html = '';
      data.forEach(function(img) {
        var shortName = img.filename.length > 20 ? img.filename.slice(0, 17) + '...' : img.filename;
        html += '<div class="image-card" data-id="' + img.id + '">'
          + '<button class="delete-btn" onclick="deleteImage(' + img.id + ')">&times;</button>'
          + '<img src="' + img.oss_url + '" alt="' + img.filename + '" loading="lazy">'
          + '<div class="info">'
          + '<span class="url" onclick="copyUrl(\'' + img.oss_url + '\', this)" title="点击复制链接">' + shortName + '</span>'
          + '<button class="copy-btn" onclick="copyUrl(\'' + img.oss_url + '\', this)">复制</button>'
          + '</div></div>';
      });
      imageGrid.innerHTML = html;
    })
    .catch(function() {
      imageGrid.innerHTML = '<div class="empty">加载失败</div>';
    });
}

function copyUrl(url, el) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(url).then(function() {
      el.textContent = '已复制!';
      setTimeout(function() { el.textContent = el.classList.contains('copy-btn') ? '复制' : el.textContent; }, 1500);
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = url; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    el.textContent = '已复制!';
    setTimeout(function() { el.textContent = el.classList.contains('copy-btn') ? '复制' : el.textContent; }, 1500);
  }
}

function deleteImage(id) {
  if (!confirm('确定删除这张图片吗？')) return;
  fetch('/api/images/' + id, { method: 'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) { toast('已删除', true); loadImages(); }
      else { toast(data.error || '删除失败', false); }
    })
    .catch(function() { toast('删除失败', false); });
}

loadImages();
</script>
</body>
</html>
